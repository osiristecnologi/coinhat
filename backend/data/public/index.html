<!DOCTYPE html>
<html>
<head>
  <title>Coinhat DEX</title>
  <style>
    body { font-family: system-ui; background: #0a0a0a; color: #fff; padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .card { 
      background: #1a1a1a; border: 1px solid #333; border-radius: 12px; 
      padding: 16px; display: flex; gap: 12px; align-items: center;
    }
    .card img { width: 48px; height: 48px; border-radius: 50%; }
    .card h3 { margin: 0; font-size: 16px; }
    .card p { margin: 4px 0 0; color: #888; font-size: 14px; }
    .price { margin-left: auto; text-align: right; }
    .price .usd { font-weight: bold; font-size: 18px; }
    .green { color: #16c784; } .red { color: #ea3943; }
    .loading { text-align: center; padding: 40px; color: #666; }
  </style>
</head>
<body>
  <h1>Top Solana Memecoins</h1>
  <div id="tokens" class="grid">
    <div class="loading">Carregando tokens...</div>
  </div>

<script>
fetch('https://coinhat.onrender.com/api/coins')
  .then(r => r.json())
  .then(({ coins }) => {
    const container = document.getElementById('tokens');
    
    if (!coins.length) {
      container.innerHTML = '<div class="loading">Nenhum token encontrado</div>';
      return;
    }

    container.innerHTML = coins.map(t => {
      const change = parseFloat(t.change24h || 0);
      const changeClass = change >= 0 ? 'green' : 'red';
      const price = parseFloat(t.priceUsd || 0).toLocaleString('en-US', {
        style: 'currency', currency: 'USD', minimumFractionDigits: 6
      });
      
      return `
        <div class="card">
          <img src="${t.imageUrl || 'https://via.placeholder.com/48'}" onerror="this.src='https://via.placeholder.com/48'">
          <div>
            <h3>${t.name}</h3>
            <p>${t.symbol}</p>
          </div>
          <div class="price">
            <div class="usd">${price}</div>
            <div class="${changeClass}">${change.toFixed(2)}%</div>
          </div>
        </div>
      `;
    }).join('');
  })
  .catch(err => {
    document.getElementById('tokens').innerHTML = 
      '<div class="loading">Erro ao carregar. Tenta de novo.</div>';
    console.error(err);
  });
</script>
</body>
</html>
